<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/adminDashboard.css" />

    <!-- -----------font awesome cdn-------------- -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- ---------------------font google----------------------------->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>

  <body>
    <section class="adminDashboard">
      <div class="left-container">
        <div class="dash" >
          <p id="username"><span>User,</span></p>
          <hr
            style="width: 100%; height: 1px; background: rgb(219, 219, 219); margin: 5px 0; " />
          <p id="dashboard">dashboard</p>
        </div>

        <div class="links">
          <h2 >ELEMENTS</h2>
          <hr
            style="
              width: 100%;
              height: 1px;
              background: rgb(219, 219, 219);
              margin: 10px 0;
            "
          />
          <p id="tables">Tables</p>
          <p id="form">Forms</p>
          <p id="users">Users</p>
          <p id="studentlist">Student Lists</p>
          <p id="logOutbtn">logout</p>
        </div>
      </div>

      <div class="right-container">
        <div class="dashboard-container content-section" id="dashboard-container">
          <div class="box">
            <h1>Total Users</h1>
            <p id="totalUser">1000</p>
            <a href="">Check Details <i class="fa-solid fa-arrow-right"></i></a>
          </div>
          <div class="box1">
            <h1>Total Application</h1>
            <p id="totalUser">1000</p>
            <a href="">Check Details <i class="fa-solid fa-arrow-right"></i></a>
          </div>
          <div class="box2">
            <h1>Total Forms</h1>
            <p id="totalUser">1000</p>
            <a href="">Check Details <i class="fa-solid fa-arrow-right"></i></a>
          </div>
        </div>

        <div class="table content-section" id="tables-container ">
          123
        </div>

        <div class="form-details content-section" id="form-details">
          <div class="filter-bar">
            <span
              ><input type="search" placeholder="Search here" /><i
                class="fa-brands fa-sistrix"
              ></i
            ></span>
            <select name="select" id="select">
              <option value="select">position</option>
              <option value="frontend">Frontend</option>
              <option value="frontend">Backend</option>
              <option value="frontend">MERN Stack</option>
              <option value="frontend">Ui/UX</option>
              <option value="frontend">Web Development</option>
            </select>
            <select name="approv" id="approved">
              <option value="select">Select</option>
              <option value="select">Approved</option>
              <option value="select">Not Approved</option>
            </select>
          </div>

          <div class="table-wrapper">
            <table class="form-show">
            <thead class="form-box">
              <tr>
                <th>Name</th>
                <th>Position</th>
                <th>Submition date</th>
                <th>Approve</th>
              </tr>
            </thead>
            <tbody class="form-box2">
              <tr>
                <td id="form-name">Alfahad</td>
                <td id="form-position">Frontend Developer</td>
                <td id="form-date">20/02/2026</td>
                <td id="form-approve">Approved</td>
              </tr>
            </tbody>
          </table>
          </div>
        </div>

        <div class="users content-section" id="users-container">
          1
        </div>
        <div class="studentlist content-section" id="student-container">
          alfahad
        </div>
      </div>
    </section>

    <script src="../js/adminBashboard.js"></script>
  </body>
</html>
