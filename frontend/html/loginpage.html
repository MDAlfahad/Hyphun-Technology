<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Accounts</title>

    <link rel="stylesheet" href="../css/login.css" />

    <!-- -----------font awesome cdn-------------- -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <section class="loginPage">
      <div class="left-container">
       <div class="shape">
         <img src="../images/login.webp" alt="" />
       </div>
       
      </div>
      <div class="box-container"  id="login-form" ;>
        <h1>LOGIN</h1>

        <form action="submit" onsubmit="login(event)" id="form-login">
          <input id="login-email" type="email" placeholder="Email" required />
          <input
            id="login-password"
            type="Password"
            placeholder="Password"
            required
          />
          <p id="invalidlogin" style="color: red;"></p>
          <button id="btn" type="submit">LOGIN</button>
        </form>
        <p>Don't have account?<a onclick="signup()" href="#signupform"> Signup</a></p>
        <div class="loginWith">
          <hr />
          <p>or login with</p>
          <hr />
        </div>
        <div class="links" >
          <div class="links-img" style="padding: .5rem;">
            <img width="30px" style="display: block;" src="../images/google.png" alt="image"> <p>Continue With Google</p>
          </div>
        </div>
      </div>


      <div class="box-container" id="signupform" style="display: none;" >
        <h1>Create Account</h1>
        
        <form id="form-signup" class="form-signup">
          
          <input id="sign-name" type="text" placeholder="Name" required />
         
          <input id="sign-email" type="email" placeholder="Email" required />
        
          <input
            id="sign-password"
            type="Password"
            placeholder="Password"
            required
          />
        
          <input
            id="sign-re-password"
            type="password"
            placeholder="Password"
            required
          />
          <p id="invalidpass" style="color: red;"></p>
          <button id="sign-btn" style="border-radius: 5px;" type="submit">Create Account</button>
        </form>
        <p>Already have account?<a onclick="login()" href="#signupform"> Login</a></p>
        <div class="loginWith">
          <hr />
          <p>or continue with</p>
          <hr />
        </div>
        <div class="links">
          <div class="links-img" style="padding: .5rem;">
            <img width="30px" style="display: block;" src="../images/google.png" alt="image"> <p>Continue With Google</p>
          </div>
        </div>
      </div>
    </section>




    <script src="../js/login-signup.js"></script>
  </body>
</html>
