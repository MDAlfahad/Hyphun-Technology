<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/studentDashboard.css" />

    <!-- ---------------------font google----------------------------->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- -----------font awesome cdn-------------- -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <section class="dashboard-container" id="dashboard-container">
      <div class="profile" id="profile">
        <div class="image">
          <img src="" alt="" id="img" />
        </div>
        <input
          type="file"
          name="upload image"
          id="imageupload"
          accept="image/*"
          hidden
        />
        <label class="label" for="imageupload"> Edit</label>
        <div id="profileDetails" class="profileDetails"></div>
        <button id="logout">Logout</button>
      </div>
      <div style="width: 100%; height: 100vh; overflow-y: auto;">
        
       <div class="table-wrapper">
         <table class="form-show">
        <thead class="form-box">
          <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Submition date</th>
            <th>Approve</th>
          </tr>
        </thead>
        <tbody class="form-box2">
          <tr>
            <td id="form-name">Alfahad</td>
            <td id="form-position">Frontend Developer</td>
            <td id="form-date">20/02/2026</td>
            <td id="form-approve">Approved</td>
          </tr>
        </tbody>
      </table>
       </div>
      </div>
    </section>

    <script src="../js/studentDashboard.js"></script>
  </body>
</html>
