    <section class="dashboard-container" id="dashboard-container">

        <div class="image">
          <img src="" alt="" id="img" />
        </div>
        <input
          type="file"
          name="upload image"
          id="imageupload"
          accept="image/*"
          hidden
        />
        <label class="label" for="imageupload"> Edit</label>
        <div id="profileDetails" class="profileDetails">

        </div>
        <button id="logout">Logout</button>
      </div>
      <div class="datas">
        <div class="box">
          <div class="jobtable">
            <h1>Position</h1>
            <h1>Apply Date</h1>
            <h1>Position</h1>
            <h1>Delete</h1>
          </div>
          <div  id="jobFormData"></div>
        </div>
      </div>
    </section>

    <script src="../js/studentDashboard.js"></script>
