<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>job Details | job</title>
    <link rel="stylesheet" href="../css/showJobData.css" />

    <!-- -----------font awesome cdn-------------- -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <section>
      <h1 id="heading"></h1>
      <div class="container">
        <h1 id="head"></h1>
        <p id="company"></p>

        <div style="margin: 1rem 0;">
          <h6 style="color: gray;" id="location"><i class="fa-solid fa-location"></i></h6>
        </div>
        <div class="box">
          <span>
            Start Date
            <p id="date"></p>
          </span>
          <span>
            CTC (ANNUAL)
            <p id="amount"></p>
          </span>
          <span>
            Experience
            <p id="experience"></p>
          </span>
          <span>
            Apply By
            <p id="applydate"></p>
          </span>
          <span>
            Job Type
            <p id="type"></p>
          </span>
        </div>
        <div class="container-box">
          <h1>About this job</h1>
          <p id="jobdetails"></p>
        </div>
        <div style="margin-top: 2rem;">
          <h1>Skills Required</h1>
          <p id="skills"></p>
        </div>
        <div class="container-box">
          <h1>Other Requirement</h1>
          <p id="requirement">
           
          </p>
        </div>

        <div style = 'margin: 4rem 0; display: flex; justify-content: center;'>
          <button id="applybtn">Apply</button>
        </div>
      </div>
    </section>
    <script src="../js/showJobData.js"></script>
  </body>
</html>
